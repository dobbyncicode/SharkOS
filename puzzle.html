<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📬 You have a message</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Courier New', monospace;
      background: #0a0a0f;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      max-width: 400px;
      text-align: center;
    }
    h1 { font-size: 24px; margin-bottom: 20px; color: #ff6b9d; }
    .clue {
      background: #12121a;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 16px;
      border: 1px solid #2a2a35;
    }
    .hint { font-size: 14px; color: #6a6a7a; margin-bottom: 8px; }
    input {
      width: 100%;
      padding: 12px;
      background: #0a0a0f;
      border: 1px solid #2a2a35;
      border-radius: 8px;
      color: #e0e0e0;
      font-family: inherit;
      text-align: center;
      font-size: 14px;
    }
    input:focus { outline: none; border-color: #ff6b9d; }
    #result {
      margin-top: 16px;
      padding: 16px;
      border-radius: 8px;
      display: none;
    }
    #result.correct { background: #1a3a2a; border: 1px solid #28c840; }
    #result.wrong { background: #3a1a1a; border: 1px solid #ff5f57; }
    .link { color: #ff6b9d; word-break: break-all; }
    .emoji { font-size: 48px; margin-bottom: 16px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="emoji">🦈</div>
    <h1>May gift ako sayo...</h1>
    
    <div class="clue">
      <div class="hint">Clue #1</div>
      <p>19 months na tayong magkasama. Ilang buwan na?</p>
    </div>
    
    <div class="clue">
      <div class="hint">Clue #2</div>
      <p>Name mo sa'kin...</p>
    </div>
    
    <div class="clue">
      <div class="hint">Clue #3</div>
      <p>🦈</p>
    </div>
    
    <input type="text" id="answer" placeholder="Type the answer...">
    <div id="result"></div>
  </div>

  <script>
    const input = document.getElementById('answer');
    const result = document.getElementById('result');
    
    input.addEventListener('keyup', (e) => {
      const val = e.target.value.toLowerCase().trim();
      
      // Accept shark, sharkos, or even just "shark"
      if (val === 'shark' || val === 'sharkos') {
        result.className = 'correct';
        result.style.display = 'block';
        result.innerHTML = '🎉 Galing mo! <a href="https://dobbyncicode.github.io/SharkOS/" class="link" target="_blank">Click dito para i-open!</a>';
      } else if (val.length > 0) {
        if (val.includes('shark')) {
          result.className = 'correct';
          result.style.display = 'block';
          result.innerHTML = '🎉 Almost! Try without extra letters. <a href="https://dobbyncicode.github.io/SharkOS/" class="link" target="_blank">Or click dito na lang!</a>';
        } else {
          result.className = 'wrong';
          result.style.display = 'block';
          result.textContent = '❌ Hint: Isang hayop lang yan 🦈';
        }
      } else {
        result.style.display = 'none';
      }
    });
  </script>
</body>
</html>
