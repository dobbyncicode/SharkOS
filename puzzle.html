<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📬 You have a message</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Courier New', monospace;
      background: #0a0a0f;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      max-width: 400px;
      text-align: center;
    }
    h1 { font-size: 24px; margin-bottom: 20px; color: #ff6b9d; }
    .clue {
      background: #12121a;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 16px;
      border: 1px solid #2a2a35;
    }
    .hint { font-size: 14px; color: #6a6a7a; margin-bottom: 8px; }
    input {
      width: 100%;
      padding: 12px;
      background: #0a0a0f;
      border: 1px solid #2a2a35;
      border-radius: 8px;
      color: #e0e0e0;
      font-family: inherit;
      text-align: center;
      font-size: 14px;
    }
    input:focus { outline: none; border-color: #ff6b9d; }
    #result {
      margin-top: 16px;
      padding: 16px;
      border-radius: 8px;
      display: none;
    }
    #result.correct { background: #1a3a2a; border: 1px solid #28c840; }
    #result.wrong { background: #3a1a1a; border: 1px solid #ff5f57; }
    .link { color: #ff6b9d; word-break: break-all; }
    .emoji { font-size: 48px; margin-bottom: 16px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="emoji">🦈</div>
    <h1>You have a message...</h1>
    
    <div class="clue">
      <div class="hint">Clue #1</div>
      <p>I'm not a hacker, but I hacked your heart 19 months ago.</p>
    </div>
    
    <div class="clue">
      <div class="hint">Clue #2</div>
      <p>My name is at the end of this URL:</p>
      <p style="font-size: 12px; color: #6a6a7a; margin-top: 8px;">https://dobbyncicode.github.io/___</p>
    </div>
    
    <div class="clue">
      <div class="hint">Clue #3</div>
      <p>It's the name of this animal: 🦈</p>
    </div>
    
    <input type="text" id="answer" placeholder="Type the answer...">
    <div id="result"></div>
  </div>

  <script>
    const input = document.getElementById('answer');
    const result = document.getElementById('result');
    
    input.addEventListener('keyup', (e) => {
      const val = e.target.value.toLowerCase().trim();
      
      if (val === 'sharkos') {
        result.className = 'correct';
        result.style.display = 'block';
        result.innerHTML = '🎉 Correct! <a href="https://dobbyncicode.github.io/SharkOS/" class="link" target="_blank">https://dobbyncicode.github.io/SharkOS/</a>';
      } else if (val.length > 0) {
        result.className = 'wrong';
        result.style.display = 'block';
        result.textContent = '❌ Hint: The animal in the emoji!';
      } else {
        result.style.display = 'none';
      }
    });
  </script>
</body>
</html>
